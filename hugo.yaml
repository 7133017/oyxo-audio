baseURL: "https://oyxo.com/"
locale: zh-CN
defaultContentLanguage: zh-cn
title: "OYXO 音响发烧站 | 耳机·音箱·HiFi器材评测"
theme: PaperMod

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false
enableEmoji: true

googleAnalytics: ""

minify:
  disableXML: true
  minifyOutput: true

params:
  env: production
  title: "OYXO 音响发烧站"
  description: "专注于 HiFi 音响、耳机、音箱、解码耳放等音频器材的评测与资讯分享"
  keywords: [HiFi, 音响, 耳机, 音箱, 发烧友, 音频评测, 解码器, 耳放, 桌面音响]
  author: "OYXO Audio"
  images: ["/images/og-image.png"]
  DateFormat: "2006-01-02"
  defaultTheme: auto
  disableThemeToggle: false

  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: true
  ShowRssButton: true
  ShowToc: true
  TocOpen: false
  ShowLastMod: true

  homeInfoParams:
    Title: "欢迎来到 OYXO 音响发烧站"
    Content: "专注于 HiFi 音响、耳机、音箱、解码耳放等音频器材的深度评测与发烧指南。声而不凡，一听倾心。"

  socialIcons:
    - name: email
      url: "mailto:7133017@qq.com"
    - name: rss
      url: "/index.xml"

  assets:
    disableHLJS: true
    favicon: "/images/favicon.ico"
    apple_touch_icon: "/images/apple-touch-icon.png"

  label:
    text: "OYXO 音响"
    icon: "/images/logo.png"
    iconHeight: 32

  cover:
    hidden: false
    hiddenInList: false
    hiddenInSingle: true

  editPost:
    URL: ""
    Text: "" 
    appendFilePath: false

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]

taxonomies:
  category: categories
  tag: tags
  series: series

menu:
  main:
    - identifier: reviews
      name: 评测
      url: /categories/评测/
      weight: 10
    - identifier: guides
      name: 指南
      url: /categories/指南/
      weight: 20
    - identifier: news
      name: 资讯
      url: /categories/资讯/
      weight: 30
    - identifier: knowledge
      name: 知识
      url: /categories/知识/
      weight: 40
    - identifier: tags
      name: 标签
      url: /tags/
      weight: 50
    - identifier: search
      name: 搜索
      url: /search/
      weight: 60

outputs:
  home:
    - HTML
    - RSS
    - JSON
  page:
    - HTML
    - RSS
  section:
    - HTML
    - RSS
